# This file was auto-generated by the Firebase CLI
# https://github.com/firebase/firebase-tools

name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Write service account credentials
        run: echo "$FIREBASE_SA" > /tmp/gcp-sa.json
        env:
          FIREBASE_SA: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_TAB_CLOCK }}

      - name: Deploy Firebase Functions
        run: |
          npm install --prefix functions
          npm install -g firebase-tools
          firebase deploy --only functions --project tab-clock
          rm -f /tmp/gcp-sa.json
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/gcp-sa.json

      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_TAB_CLOCK }}
          channelId: live
          projectId: tab-clock
