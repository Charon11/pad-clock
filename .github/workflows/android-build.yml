name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      release_notes:
        description: 'Release notes for this build'
        required: false
        default: ''
      testers_groups:
        description: 'Firebase App Distribution tester group aliases (comma-separated)'
        required: false
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Sync Capacitor Android project
        run: npx cap sync android

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - uses: android-actions/setup-android@v3

      - name: Build debug APK
        working-directory: ./android
        run: ./gradlew assembleDebug --no-daemon

      - uses: actions/upload-artifact@v4
        with:
          name: tab-clock-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: Upload to Firebase App Distribution
        uses: w9jds/firebase-action@master
        with:
          args: >-
            appdistribution:distribute android/app/build/outputs/apk/debug/app-debug.apk
            --app 1:402746265461:android:1db8157a0bf23d0ed10d3c
            ${{ inputs.release_notes != '' && format('--release-notes "{0}"', inputs.release_notes) || '' }}
            ${{ inputs.testers_groups != '' && format('--groups "{0}"', inputs.testers_groups) || '' }}
          projectId: tab-clock
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
