# This file was auto-generated by the Firebase CLI
# https://github.com/firebase/firebase-tools

name: Deploy to Firebase Hosting on PR
on: pull_request
permissions:
  checks: write
  contents: read
  pull-requests: write
jobs:
  build_and_preview:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Deploy function to Firebase 
        uses: w9jds/firebase-action@master
        with:
          args: deploy --only functions
          # repoToken: '${{ secrets.GITHUB_TOKEN }}' # Not typically needed for w9jds/firebase-action
          # firebaseServiceAccount: '' # Not needed if using FIREBASE_TOKEN
          # channelId: live # Not a standard input for w9jds/firebase-action, deployment is usually to live
          projectId: the-nba-bet-app # Your Firebase project ID from firebase.json
          # The w9jds/firebase-action typically uses FIREBASE_TOKEN environment variable directly
        env:
          GCP_SA_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_TAB_CLOCK }}

      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          expires: 7d
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_TAB_CLOCK }}
          projectId: tab-clock
